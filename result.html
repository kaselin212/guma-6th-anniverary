<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score & Leaderboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        
        .result-container {
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid var(--t1-gold);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 0 30px rgba(198, 156, 109, 0.2);
            margin-bottom: 40px;
        }

        .total-score {
            font-size: 5rem;
            font-weight: 900;
            color: var(--t1-red);
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(228, 0, 43, 0.5);
        }

        .action-area {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #333;
        }

        input[type="text"] {
            padding: 12px;
            font-size: 1.2rem;
            border: 1px solid var(--t1-gold);
            background: #222;
            color: white;
            border-radius: 4px;
            margin-right: 10px;
            width: 60%;
            text-align: center;
        }

        /* 排行榜區塊 */
        .leaderboard {
            width: 100%;
            max-width: 600px;
            background: #1a1a1a;
            border-radius: 8px;
            padding: 20px;
        }

        .leaderboard h3 {
            color: var(--t1-gold);
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .score-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            border-bottom: 1px solid #333;
            font-size: 1.1rem;
        }

        .score-item:nth-child(1) { color: #f1c40f; font-weight: bold; font-size: 1.3rem;}
        .score-item:nth-child(2) { color: #bdc3c7; font-weight: bold; font-size: 1.2rem;}
        .score-item:nth-child(3) { color: #cd7f32; font-weight: bold; }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="result-container">
        <h2>ADC COMPREHENSIVE EVALUATION</h2>
        <div style="color: #888; letter-spacing: 2px;">YOUR TOTAL SCORE</div>
        
        <div class="total-score" id="display-score">0</div>
        
        <div class="action-area" id="action-area">
            <p>載入玩家資料中...</p>
        </div>

        <div class="btn-group">
            <button onclick="replayGame()" class="btn-small">↺ 重新挑戰</button>
            <a href="celebration.html" class="btn-small filled">進入榮譽殿堂 →</a>
        </div>
    </div>

    <div class="leaderboard">
        <h3>🏆 GLOBAL TOP 10</h3>
        <ul class="score-list" id="leaderboard-list">
            <li class="score-item" style="justify-content: center; color: #888;">正在連接伺服器...</li>
        </ul>
    </div>

    <script type="module">
        // 1. 引入 Firebase 核心與 Firestore 資料庫 (使用您的 12.10.0 版本)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, query, collection, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        
        // 2. 您的專屬 Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyChQdD8KpstHUXd2KVnS9OohurWte3sBOQ",
            authDomain: "guma-6th-game.firebaseapp.com",
            projectId: "guma-6th-game",
            storageBucket: "guma-6th-game.firebasestorage.app",
            messagingSenderId: "963526267859",
            appId: "1:963526267859:web:d283700e33d19776341526"
        };

        // 3. 初始化 Firebase 與資料庫連線
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 取得 DOM 元素
        const scoreDisplay = document.getElementById('display-score');
        const actionArea = document.getElementById('action-area');
        
        // 讀取本次遊玩的分數 (如果沒有就是 0)
        let currentScore = parseInt(sessionStorage.getItem('guma_current_score')) || 0; 
        scoreDisplay.innerText = currentScore;

        // 判斷玩家身分與歷史紀錄
        const playerUUID = localStorage.getItem('guma_uuid');
        const playerName = localStorage.getItem('guma_name');
        const highScore = parseInt(localStorage.getItem('guma_highscore')) || 0;

        renderActionArea();

        function renderActionArea() {
            // 如果連 1 分都沒有，代表他根本沒玩直接跑來這頁
            if (currentScore === 0) {
                actionArea.innerHTML = `<p style="color: #888;">您還沒有遊戲紀錄喔！趕快去挑戰吧！</p>`;
                return;
            }

            if (!playerUUID) {
                // 狀態 A：完全的新玩家
                actionArea.innerHTML = `
                    <p style="margin-bottom: 15px; color: #ccc;">將你的成就銘刻在傳奇榜單上</p>
                    <input type="text" id="input-name" placeholder="輸入您的暱稱 (最多10字)" maxlength="10">
                    <button id="submit-btn" class="btn-small filled">上傳成績</button>
                `;
                document.getElementById('submit-btn').addEventListener('click', handleFirstTimeSubmit);
            } 
            else if (currentScore > highScore) {
                // 狀態 B：老玩家破紀錄
                actionArea.innerHTML = `
                    <p style="margin-bottom: 15px; color: #2ecc71;">🎉 新紀錄！幹得好，${playerName}！</p>
                    <button id="submit-btn" class="btn-small filled">更新排行榜成績</button>
                `;
                document.getElementById('submit-btn').addEventListener('click', handleUpdateSubmit);
            } 
            else {
                // 狀態 C：老玩家沒破紀錄
                actionArea.innerHTML = `
                    <p style="color: #888;">這次差一點點喔，${playerName}！</p>
                    <p style="color: #666; font-size: 0.9rem;">您的最高分紀錄是: <span style="color: var(--t1-gold);">${highScore}</span></p>
                `;
            }
        }

        // --- 處理送出邏輯 (寫入資料庫) ---

        function generateUUID() {
            return crypto.randomUUID ? crypto.randomUUID() : 'user-' + Math.random().toString(36).substr(2, 9);
        }

        async function handleFirstTimeSubmit() {
            const nameInput = document.getElementById('input-name').value.trim();
            if (!nameInput) return alert("請輸入暱稱！");

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "上傳中...";

            const newUUID = generateUUID();
            localStorage.setItem('guma_uuid', newUUID);
            localStorage.setItem('guma_name', nameInput);
            localStorage.setItem('guma_highscore', currentScore);

            try {
                // 真實寫入 Firebase Firestore
                await setDoc(doc(db, "scores", newUUID), {
                    name: nameInput,
                    score: currentScore,
                    timestamp: new Date().toISOString()
                });
                
                alert(`上傳成功！歡迎加入榜單，${nameInput}！`);
                renderActionArea(); 
                loadLeaderboard(); // 刷新榜單
            } catch (e) {
                console.error("寫入錯誤:", e);
                alert("上傳失敗，請檢查網路連線。");
                btn.disabled = false;
                btn.innerText = "重新上傳";
            }
        }

        async function handleUpdateSubmit() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "更新中...";

            localStorage.setItem('guma_highscore', currentScore);

            try {
                // 覆寫 Firebase 裡原本那筆資料
                await setDoc(doc(db, "scores", playerUUID), {
                    name: playerName,
                    score: currentScore,
                    timestamp: new Date().toISOString()
                }, { merge: true });
                
                alert("紀錄更新成功！");
                renderActionArea();
                loadLeaderboard();
            } catch(e) { 
                console.error("更新錯誤:", e);
                alert("更新失敗，請稍後再試。");
                btn.disabled = false;
                btn.innerText = "重新更新";
            }
        }

        // --- 讀取排行榜邏輯 (從資料庫抓取前 10 名) ---
        async function loadLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = `<li class="score-item" style="justify-content: center; color: #888;">正在連接伺服器...</li>`;
            
            try {
                // 查詢 scores 集合，按分數遞減排序，取前 10 名
                const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(10));
                const querySnapshot = await getDocs(q);
                
                list.innerHTML = ""; // 清空載入中提示
                
                if (querySnapshot.empty) {
                    list.innerHTML = `<li class="score-item" style="justify-content: center; color: #888;">目前還沒有人挑戰喔！</li>`;
                    return;
                }

                let rank = 1;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const li = document.createElement('li');
                    li.className = 'score-item';
                    
                    // 前三名給特別的顏色
                    let rankColor = "#888";
                    if (rank === 1) rankColor = "#f1c40f"; // 金
                    if (rank === 2) rankColor = "#bdc3c7"; // 銀
                    if (rank === 3) rankColor = "#cd7f32"; // 銅

                    li.innerHTML = `
                        <span style="color: ${rankColor}; font-weight: bold; width: 30px;">#${rank}</span>
                        <span style="flex-grow:1; text-align:left; margin-left: 10px;">${data.name}</span>
                        <span style="color: var(--t1-gold);">${data.score}</span>
                    `;
                    list.appendChild(li);
                    rank++;
                });

            } catch (e) {
                console.error("讀取排行榜錯誤:", e);
                list.innerHTML = `<li class="score-item" style="justify-content: center; color: #E4002B;">無法載入排行榜，請稍後再試。</li>`;
            }
        }

        // 頁面載入時執行
        loadLeaderboard();
    </script>

    <script>
        // 重新挑戰邏輯：清空當局暫存，跳回第一關
        function replayGame() {
            sessionStorage.removeItem('guma_current_score');
            window.location.href = 'game1.html';
        }
    </script>
</body>
</html>
