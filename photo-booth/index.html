<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>線上拍貼機</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/fabric@6/dist/index.js"></script>
</head>
<body>

  <div id="orientation-mask" class="overlay">
    <div class="overlay-content">
      <div class="rotate-icon">🔄</div>
      <h2>請轉動手機</h2>
      <p>您選擇了橫式排版，請將裝置轉為橫向以進行拍攝</p>
    </div>
  </div>

  <section id="phase1-layout" class="view-section active">
    <header>
      <h1>選擇拍貼排版</h1>
      <p>請選擇您想要的洗照片格式</p>
    </header>
    
    <div class="layout-options">
      <label class="layout-card">
        <input type="radio" name="layoutType" value="polaroid" checked>
        <div class="card-ui">
          <div class="placeholder-box portrait-box"></div>
          <span>單張拍立得</span>
        </div>
      </label>

      <label class="layout-card">
        <input type="radio" name="layoutType" value="korean4x1">
        <div class="card-ui">
          <div class="placeholder-box landscape-box"></div>
          <span>韓式 4x1</span>
        </div>
      </label>
    </div>

    <button id="btn-next" class="btn-primary">下一步</button>
  </section>

  <section id="phase2-camera" class="view-section">
    <header>
      <h1>準備拍攝</h1>
    </header>
    
    <button id="btn-switch-cam" class="btn-secondary">🔄 切換前後鏡頭</button>

    <div class="camera-viewport">
      <video id="camera-stream" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
    </div>

    <button id="btn-capture" class="btn-primary">📸 拍照</button>
    <button id="btn-back" class="btn-secondary">返回重選</button>

    <canvas id="capture-canvas" style="display: none;"></canvas>
    
    <div id="photo-gallery" style="display: flex; gap: 8px; margin-top: 16px; overflow-x: auto;"></div>
    <button id="btn-go-edit" class="btn-primary" style="display: none; margin-top: 12px;">🎨 進入編輯</button>
  </section>

  <section id="phase3-editor" class="view-section">
    <header>
      <h1>編輯專屬拍貼</h1>
    </header>
    
    <div class="canvas-container" style="display: flex; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 24px;">
      <canvas id="editor-canvas"></canvas>
    </div>

    <div id="frame-list" class="frame-bar" style="display: flex; gap: 12px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 8px;">
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <p style="font-size: 14px; font-weight: bold; margin-left: 8px;">貼紙</p>
      <button id="btn-delete-obj" class="btn-secondary" style="width: auto; padding: 4px 12px; font-size: 14px; margin-top: 0; display: none; color: #ff4d4f; border-color: #ff4d4f; background: #fff;">
        🗑️ 刪除選取貼紙
      </button>
    </div>
    
    <div class="sticker-bar" style="display: flex; gap: 12px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px;">
      <button class="btn-sticker btn-secondary" style="width:auto; padding:8px 16px; border-radius:30px; font-size: 24px;">🌟</button>
      <button class="btn-sticker btn-secondary" style="width:auto; padding:8px 16px; border-radius:30px; font-size: 24px;">💖</button>
      <button class="btn-sticker btn-secondary" style="width:auto; padding:8px 16px; border-radius:30px; font-size: 24px;">🔥</button>
      <button class="btn-sticker btn-secondary" style="width:auto; padding:8px 16px; border-radius:30px; font-size: 24px;">😎</button>
    </div>

    <button id="btn-download" class="btn-primary">💾 儲存並下載</button>
  </section>

  <script src="app.js"></script>
</body>
</html>
