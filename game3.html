<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 3: The Outplay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Forum&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <img src="guma-logo.png" alt="Gumayusi" class="top-left-logo">

    <div class="game-wrapper">
        <div class="game-header">
            <div class="header-top">
                <a href="index.html" class="pill-btn secondary"><i class="fa-solid fa-arrow-left"></i> 返回主畫面</a>
            </div>
            <div class="header-bottom">
                <div class="game-title">
                    <span class="chap">Chapter. 3</span>
                    <span class="tw">拉扯藝術</span>
                    <span class="en">The Outplay</span>
                </div>
                <div class="game-objective">
                    任務 3：靠近圈圈內自動攻擊，躲避紫色招式！ ( PLAYER HP: <span id="player-hp" style="color: var(--color-pink); font-weight: bold;">200</span> )
                </div>
            </div>
        </div>

        <div id="game-container" class="mode-kiting">
            <div id="range-circle" class="range-indicator"></div>

            <div id="player">
                <i class="fa-solid fa-feather-pointed"></i>
            </div>

            <div id="boss" class="boss">
                <i class="fa-solid fa-dragon"></i>
                <div class="boss-hp-bar">
                    <div id="boss-hp-fill" class="boss-hp-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="victory-modal" class="result-modal">
        <div class="result-content">
            <img src="guma-logo.png" alt="Gumayusi" class="result-logo">

            <div class="result-header">
                <div class="result-title-group">
                    <h2 class="result-chapter">Chapter. 3</h2>
                    <div class="cleared-stamp">Cleared</div>
                </div>
                <div class="result-date">2022 LCK Spring Champion</div>
            </div>

            <div class="video-container" style="display:flex; justify-content:center; align-items:center; background:#111; height:200px; border-radius:10px; margin-bottom:20px; font-size:3rem; color:#E4002B; font-weight:bold;">
                2022
            </div>

            <h3 class="result-nickname">The Outplay</h3>
            <p class="result-story">
                "Gumayusi is distinct!"<br>
                2022年，T1 以全勝之姿奪下春季賽冠軍。<br>
                無論面對多少刺客的針對，<br>
                他總能在極限距離打出爆炸輸出。
            </p>

            <div class="result-score-box">
                累計表現評分 : <span id="current-total-score" class="score-number">0</span>
            </div>

            <div class="result-actions">
                <button onclick="location.reload()" class="pill-btn outline">↺ 重新遊玩</button>
                <a href="game4.html" class="pill-btn outline">下一章節 →</a>
            </div>
        </div>
    </div>

    <script src="game3.js"></script>
</body>
</html>
