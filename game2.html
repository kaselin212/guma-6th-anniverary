<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 2: The Sniper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Forum&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <img src="guma-logo.png" alt="Gumayusi" class="top-left-logo">

    <div class="game-wrapper">
        <div class="game-header">
            <div class="header-top">
                <a href="index.html" class="pill-btn secondary"><i class="fa-solid fa-arrow-left"></i> 返回主畫面</a>
            </div>
            <div class="header-bottom">
                <div class="game-title">
                    <span class="chap">Chapter. 2</span>
                    <span class="tw">神射手</span>
                    <span class="en">The Sniper</span>
                </div>
                <div class="game-objective">
                    任務 2：滑鼠瞄準點擊射擊敵人 ( 擊殺: <span id="score-val"
                        style="color: var(--color-pink); font-weight: bold;">0</span> / 15 | 彈藥: <span id="ammo-val"
                        style="color: var(--color-blue); font-weight: bold;">30</span> )
                </div>
            </div>
        </div>

        <div id="game-container" class="mode-sniper">
            <div id="player">
                <div id="player-rotate-layer"><i class="fa-solid fa-location-crosshairs"></i></div>
            </div>
        </div>
    </div>

    <div id="victory-modal" class="result-modal">
        <div class="result-content">
            <img src="guma-logo.png" alt="Gumayusi" class="result-logo">

            <div class="result-header">
                <div class="result-title-group">
                    <h2 class="result-chapter">Chapter. 2</h2>
                    <div class="cleared-stamp">Cleared</div>
                </div>
                <div class="result-date">2021 World Championship</div>
            </div>

            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/yxzlr_fx36s" title="YouTube video player" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen></iframe>
            </div>

            <h3 class="result-nickname">The Sniper</h3>
            <p class="result-story">
                面對四面八方的質疑與進攻，<br>
                Gumayusi 展現了絕對的自信與操作。<br>
                "我會證明我是第一 AD。"
            </p>

            <div class="result-score-box">
                累計表現評分 : <span id="current-total-score" class="score-number">0</span>
            </div>

            <div class="result-actions">
                <button onclick="location.reload()" class="pill-btn outline">↺ 重新遊玩</button>
                <a href="game3.html" class="pill-btn outline">下一章節 →</a>
            </div>
        </div>
    </div>

    <script src="game2.js"></script>
</body>

</html>
