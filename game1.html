<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 1: The Basic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Forum&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

    <img src="img/guma-logo.png" alt="Gumayusi" class="top-left-logo">

    <div class="game-wrapper">
        <div class="game-header">
            <div class="header-top">
                <a href="index.html" class="pill-btn secondary"><i class="fa-solid fa-arrow-left"></i> 返回主畫面</a>
            </div>
            <div class="header-bottom">
                <div class="game-title">
                    <span class="chap">Chapter. 1</span>
                    <span class="tw">基礎吃兵</span>
                    <span class="en">The Basic</span>
                </div>
                <div class="game-objective">
                    任務 1：尾刀小兵 10 隻 ( <span id="score-val" style="color: var(--color-pink); font-weight: bold;">0</span>
                    / 10 )
                </div>
            </div>
        </div>

        <div id="game-container" class="mode-lasthit">
        </div>
    </div>

    <div id="tutorial-modal" class="glass-modal show">
        <div class="glass-card" style="border-color: var(--color-blue); box-shadow: 0 0 30px rgba(175, 214, 239, 0.2);">
            <h2 style="color: var(--color-blue);">HOW TO PLAY</h2>
            <p>
                歡迎來到第一章：<span class="highlight-text">基礎吃兵</span>。<br><br>
                身為頂尖 ADC，尾刀是基本功。<br>
                小兵的血量會隨機減少，當血條進入 <span style="color:#f1c40f; font-weight:bold;">黃色斬殺線</span> 時，<br>
                <strong>點擊小兵</strong> 即可成功補刀！<br><br>
                <span style="font-size: 0.9rem; color: #888;">注意：太早點擊會導致 Miss 漏兵喔！</span>
            </p>
            <button onclick="startGame()" class="pill-btn primary">開始挑戰</button>
        </div>
    </div>

    <div id="victory-modal" class="result-modal">
        <div class="result-content">
            <img src="img/guma-logo.png" alt="Gumayusi" class="result-logo">

            <div class="result-header">
                <div class="result-title-group">
                    <h2 class="result-chapter">Chapter. 1</h2>
                    <div class="cleared-stamp">Cleared</div>
                </div>
                <div class="result-date">2020 / 9 / 8 Debut</div>
            </div>

            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/yxzlr_fx36s" title="YouTube video player" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen></iframe>
            </div>

            <h3 class="result-nickname">The Monster Rookie</h3>
            <p class="result-story">
                2020年，一位自信滿滿的新人在區域資格賽橫空出世。<br>
                他的凱特琳與達瑞文，讓世界記住了這個名字。
            </p>

            <div class="result-score-box">
                累計表現評分 : <span id="current-total-score" class="score-number">0</span>
            </div>

            <div class="result-actions">
                <button onclick="location.reload()" class="pill-btn outline">↺ 重新遊玩</button>
                <a href="game2.html" class="pill-btn outline">下一章節 →</a>
            </div>
        </div>
    </div>

    <script src="game1.js"></script>
</body>

</html>
